<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>My Items</title>
</head>
<body>
    <nav class="navbar">
        <a href="/dashboard" class="nav-link">HOME</a>
        <a href="/my-items" class="nav-link">MY ITEMS</a>
    </nav>

    <div style="max-width: 1100px; margin: 50px auto; padding: 0 20px;">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
            
            <section>
                <h2 style="color: var(--primary);">Currently Borrowed</h2>
                <div class="glass-card">
                    <p><b>Power Supply Unit</b> - Locker 02</p>
                    <small>Expires in 4h 20m</small>
                    <button style="display: block; margin-top: 10px; font-size: 0.8rem;">Return Item</button>
                </div>
            </section>

            <section>
                <h2 style="color: var(--secondary);">Currently Lent</h2>
                <div class="glass-card">
                    <p><b>Soldering Kit</b> - (Lent to: User 89)</p>
                    <small>Condition: Excellent</small>
                    <button style="display: block; margin-top: 10px; font-size: 0.8rem; background: var(--secondary);">Recall Item</button>
                </div>
            </section>
            
        </div>
    </div>
</body>
</html>
