<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Login | Smart Locker</title>
</head>
<body>
    <div style="display: flex; justify-content: center; align-items: center; height: 100vh;">
        <div class="glass-card" style="width: 350px; text-align: center;">
            <h1 style="background: linear-gradient(to right, #00f2fe, #7000ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Access Portal</h1>
            <form action="/dashboard">
                <input type="text" placeholder="Student ID" required>
                <input type="password" placeholder="Password" required>
                <button type="submit" style="width: 100%;">Initialize Session</button>
            </form>
        </div>
    </div>
</body>
</html>
