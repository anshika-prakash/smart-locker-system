<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="frontend/static/style.css">
    <title>Locker System | Login</title>
</head>
<body>
    <div class="container" style="max-width: 400px; text-align: center;">
        <div class="card">
            <h1 style="color: var(--primary);">Smart Locker</h1>
            <p>Scan card or enter credentials</p>
            <form action="/dashboard">
                <input type="text" placeholder="Roll Number" required>
                <input type="password" placeholder="Password" required>
                <button type="submit" class="btn-primary" style="width: 100%;">Login</button>
            </form>
            <hr style="margin: 20px 0; border: 0.5px solid #333;">
            <p style="font-size: 0.8rem; color: #888;">Hardware Status: <span style="color: var(--accent);">Waiting for RFID...</span></p>
        </div>
    </div>
</body>
</html>
