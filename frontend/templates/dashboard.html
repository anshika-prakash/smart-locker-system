<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Student Dashboard</title>
</head>
<body>
    <div class="container">
        <header style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Available Resources</h1>
            <a href="/upload"><button class="btn-secondary">+ Upload Material</button></a>
        </header>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;">
            <div class="card" style="border-top: 4px solid var(--primary);">
                <h3>Arduino Uno Kit #1</h3>
                <p>Status: <span style="color: #4caf50;">Ready in Locker 04</span></p>
                <p style="font-size: 0.9rem; color: #aaa;">Equipped with Breadboard and Jumper wires.</p>
                <button class="btn-primary">Reserve & Unlock</button>
            </div>

            <div class="card" style="border-top: 4px solid var(--accent);">
                <h3>Digital Multimeter</h3>
                <p>Status: <span style="color: #f44336;">Currently Borrowed</span></p>
                <p style="font-size: 0.9rem; color: #aaa;">Due back: 4:00 PM</p>
                <button disabled style="background: #444; cursor: not-allowed;">Unavailable</button>
            </div>
        </div>
    </div>
</body>
</html>
